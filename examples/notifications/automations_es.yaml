# Valetudo Vacuum Card — Notificaciones (Español)
# Reemplaza "valetudo_yourrobot" con el prefijo de entidad de tu robot.
# Añade a automations.yaml o importa desde la interfaz de HA.

- id: 'vacuum_cleaning_started'
  alias: "Aspiradora: limpieza iniciada"
  triggers:
    - platform: state
      entity_id: vacuum.valetudo_yourrobot
      to: cleaning
  actions:
    - service: notify.notify
      data:
        title: "🤖 Aspiradora: inicio de limpieza"
        message: "La limpieza ha comenzado"
  mode: single

- id: 'vacuum_cleaning_finished'
  alias: "Aspiradora: limpieza finalizada"
  triggers:
    - platform: state
      entity_id: vacuum.valetudo_yourrobot
      from: returning
      to: docked
  actions:
    - service: notify.notify
      data:
        title: "✅ Aspiradora: limpieza completada"
        message: >
          Limpiado {{ states('sensor.valetudo_yourrobot_current_stats_area') | float(0) / 10000 | round(1) }} m²
          en {{ (states('sensor.valetudo_yourrobot_current_stats_time') | int(0) / 60) | round(0) | int }} min
  mode: single

- id: 'vacuum_returned_to_dock'
  alias: "Aspiradora: regresó a la base"
  triggers:
    - platform: state
      entity_id: vacuum.valetudo_yourrobot
      to: docked
  actions:
    - service: notify.notify
      data:
        title: "🏠 Aspiradora: en la base"
        message: "El robot ha vuelto a la estación de carga"
  mode: single

- id: 'vacuum_error'
  alias: "Aspiradora: error"
  triggers:
    - platform: state
      entity_id: vacuum.valetudo_yourrobot
      to: error
  actions:
    - service: notify.notify
      data:
        title: "🚨 Aspiradora: error"
        message: "{{ state_attr('vacuum.valetudo_yourrobot', 'status') }}"
  mode: single

- id: 'vacuum_mop_still_attached'
  alias: "Aspiradora: fregona aún colocada"
  triggers:
    - platform: state
      entity_id: vacuum.valetudo_yourrobot
      to: docked
  conditions:
    - condition: state
      entity_id: binary_sensor.valetudo_yourrobot_mop_attachment
      state: 'on'
  actions:
    - service: notify.notify
      data:
        title: "🧹 Aspiradora: ¡retira la fregona!"
        message: "El robot está en la base pero la fregona sigue colocada"
  mode: single
  max_exceeded: silent

- id: 'vacuum_consumable_warning'
  alias: "Aspiradora: consumible bajo"
  triggers:
    - platform: numeric_state
      entity_id: sensor.valetudo_yourrobot_main_brush
      below: 540
    - platform: numeric_state
      entity_id: sensor.valetudo_yourrobot_right_brush
      below: 360
    - platform: numeric_state
      entity_id: sensor.valetudo_yourrobot_main_filter
      below: 270
    - platform: numeric_state
      entity_id: sensor.valetudo_yourrobot_sensor_cleaning
      below: 54
  actions:
    - service: notify.notify
      data:
        title: "⚠️ Aspiradora: consumible bajo"
        message: "{{ trigger.entity_id }} casi agotado (quedan {{ trigger.to_state.state }} min)"
  mode: parallel

- id: 'vacuum_consumable_depleted'
  alias: "Aspiradora: consumible agotado"
  triggers:
    - platform: numeric_state
      entity_id: sensor.valetudo_yourrobot_main_brush
      below: 1
    - platform: numeric_state
      entity_id: sensor.valetudo_yourrobot_right_brush
      below: 1
    - platform: numeric_state
      entity_id: sensor.valetudo_yourrobot_main_filter
      below: 1
    - platform: numeric_state
      entity_id: sensor.valetudo_yourrobot_sensor_cleaning
      below: 1
  actions:
    - service: notify.notify
      data:
        title: "🚨 Aspiradora: ¡reemplaza el consumible!"
        message: "{{ trigger.entity_id }} necesita reemplazo"
  mode: parallel
